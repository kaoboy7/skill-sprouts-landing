<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="theme-color" content="#3f51b5">
    <title>Skill Sprouts — Get the app</title>
    <script>
(function () {
    var PLAY =
        'https://play.google.com/store/apps/details?id=com.skillsprouts.myapp';
    var IOS =
        'https://apps.apple.com/us/app/skill-sprouts/id6754038900';
    var ua = navigator.userAgent || navigator.vendor || '';
    if (/android/i.test(ua)) {
        window.location.replace(PLAY);
        return;
    }
    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.replace(IOS);
        return;
    }
})();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

        body {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background-image: linear-gradient(120deg, #eef2ff 0%, #f9fafb 100%);
        }
    </style>
</head>

            <p class="mt-10">
